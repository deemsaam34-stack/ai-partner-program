<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Partner Program — 1XBET Serbia</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #181825;
  --border: #1e1e2e;
  --border-accent: #2a2a3e;
  --text-primary: #e8e6f0;
  --text-secondary: #8b879e;
  --text-muted: #5a5670;
  --accent: #7c5bf5;
  --accent-glow: #9d7cff;
  --accent-soft: rgba(124,91,245,0.12);
  --green: #34d399;
  --green-glow: #6ee7b7;
  --green-soft: rgba(52,211,153,0.1);
  --amber: #fbbf24;
  --amber-soft: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-soft: rgba(248,113,113,0.1);
  --blue: #60a5fa;
  --blue-soft: rgba(96,165,250,0.1);
  --radius: 14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Onest',sans-serif;font-size:14px;line-height:1.65;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 70% 10%,rgba(124,91,245,0.08) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 20% 80%,rgba(52,211,153,0.05) 0%,transparent 50%);pointer-events:none;z-index:0}
.wrapper{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:44px 20px 80px}

/* PROGRESS */
.progress-wrap{position:sticky;top:12px;z-index:100;background:var(--bg-card);border:1px solid var(--border);border-radius:99px;overflow:visible;margin-bottom:44px;backdrop-filter:blur(16px);height:8px}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.progress-label{position:absolute;right:0;top:-22px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);font-weight:600;letter-spacing:1px}

/* LANG SWITCH */
.lang-switch{position:fixed;top:16px;right:20px;z-index:200;display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:4px}
.lang-btn{background:none;border:none;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;padding:5px 10px;border-radius:7px;cursor:pointer;transition:all .2s}
.lang-btn.active{background:var(--accent-soft);color:var(--accent-glow)}
.lang-btn:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text-secondary)}

/* HEADER */
.header{margin-bottom:36px}
.header__badge{display:inline-flex;align-items:center;gap:8px;background:var(--accent-soft);border:1px solid rgba(124,91,245,0.3);border-radius:99px;padding:6px 14px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:1.5px;color:var(--accent-glow);text-transform:uppercase;margin-bottom:20px;animation:fadeDown .6s .1s ease both}
.header__title{font-size:clamp(26px,5vw,40px);font-weight:800;line-height:1.15;margin-bottom:14px;animation:fadeDown .6s .2s ease both}
.header__title span{background:linear-gradient(135deg,var(--accent-glow),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header__sub{color:var(--text-secondary);font-size:15px;max-width:580px;line-height:1.6;margin-bottom:24px;animation:fadeDown .6s .3s ease both}
.header__meta{display:flex;flex-wrap:wrap;gap:20px;animation:fadeDown .6s .4s ease both}
.header__meta-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.header__meta-item b{color:var(--text-muted)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:36px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;transition:border-color .3s,background .2s}
.stat-card:hover{border-color:var(--border-accent);background:var(--bg-card-hover)}
.stat-card__value{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent-glow);line-height:1;margin-bottom:6px}
.stat-card__value.g{color:var(--green)}
.stat-card__value.a{color:var(--amber)}
.stat-card__label{font-size:12px;color:var(--text-secondary);line-height:1.4}

/* SECTIONS */
.section{margin-bottom:28px}
.section__header{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.section__num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;flex-shrink:0}
.section__title{font-size:16px;font-weight:700;color:var(--text-primary)}
.section__badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-left:auto;flex-shrink:0}
.badge--done{background:var(--green-soft);color:var(--green);border:1px solid rgba(52,211,153,0.25)}
.badge--active{background:var(--accent-soft);color:var(--accent-glow);border:1px solid rgba(124,91,245,0.25)}
.badge--planned{background:rgba(90,86,112,0.12);color:var(--text-muted);border:1px solid var(--border)}
.badge--blue{background:var(--blue-soft);color:var(--blue);border:1px solid rgba(96,165,250,0.25)}
.badge--amber{background:var(--amber-soft);color:var(--amber);border:1px solid rgba(251,191,36,0.25)}
.section__card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .3s;overflow:hidden}
.section__card:hover{border-color:var(--border-accent)}
.section__desc{padding:14px 18px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-size:13px;line-height:1.6}
.section__period{padding:8px 18px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:0.5px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.dot.g{background:var(--green)}
.dot.a{background:var(--amber)}
.dot.b{background:var(--blue)}

/* CHECKLIST */
.item{display:flex;align-items:flex-start;gap:14px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;user-select:none}
.item:last-child{border-bottom:none}
.item:hover{background:rgba(255,255,255,0.02)}
.item.checked{background:rgba(52,211,153,0.04)}
.item__cb{flex-shrink:0;width:22px;height:22px;border:2px solid var(--border-accent);border-radius:7px;display:flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.34,1.56,.64,1);margin-top:1px}
.item.checked .item__cb{background:var(--green);border-color:var(--green)}
.item__ck{opacity:0;transform:scale(0);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.item.checked .item__ck{opacity:1;transform:scale(1)}
.item__content{flex:1;min-width:0}
.item__text{font-size:14.5px;font-weight:500;color:var(--text-primary);transition:color .2s;line-height:1.4}
.item.checked .item__text{color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--text-muted)}
.item__sub{font-size:12px;color:var(--text-muted);margin-top:3px;line-height:1.5}
.item__tag{display:inline-block;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 7px;border-radius:5px;margin-top:5px;letter-spacing:0.5px}
.tag--p{background:var(--accent-soft);color:var(--accent-glow)}
.tag--g{background:var(--green-soft);color:var(--green-glow)}
.tag--a{background:var(--amber-soft);color:var(--amber)}
.tag--b{background:var(--blue-soft);color:var(--blue)}

/* NOTES */
.note{display:flex;gap:12px;padding:12px 18px;border-top:1px solid var(--border);font-size:13px;line-height:1.6}
.note--info{background:var(--accent-soft);color:var(--accent-glow)}
.note--green{background:var(--green-soft);color:var(--green-glow)}
.note--warn{background:var(--amber-soft);color:var(--amber)}
.note--muted{color:var(--text-secondary)}
.note__icon{flex-shrink:0;font-size:15px}

/* GANTT */
.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
.gantt{min-width:700px}
.gantt__head{display:flex;margin-left:180px;margin-bottom:6px;position:relative}
.gantt__month{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--text-muted);text-transform:uppercase;text-align:center;flex-shrink:0;padding-bottom:5px;border-bottom:1px solid var(--border)}
.gantt__group-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;margin:8px 0 3px 180px}
.gantt__row{display:flex;align-items:center;padding:2px 0}
.gantt__lbl{width:180px;flex-shrink:0;font-size:11.5px;color:var(--text-secondary);padding-right:12px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt__track{flex:1;height:28px;position:relative}
.gantt__track-bg{position:absolute;inset:0;pointer-events:none}
.gantt__vl{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:0.45}
.gantt__bar{position:absolute;height:22px;top:3px;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:9.5px;font-weight:600;white-space:nowrap;overflow:hidden;font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;transition:filter .2s, opacity .2s;cursor:default}
.gantt__bar:hover{filter:brightness(1.2)}
.bar--ph0{background:linear-gradient(90deg,rgba(52,211,153,0.25),rgba(52,211,153,0.14));border:1px solid rgba(52,211,153,0.35);color:var(--green)}
.bar--ph1{background:linear-gradient(90deg,rgba(124,91,245,0.4),rgba(124,91,245,0.22));border:1px solid rgba(124,91,245,0.45);color:var(--accent-glow)}
.bar--ph2{background:linear-gradient(90deg,rgba(96,165,250,0.38),rgba(96,165,250,0.2));border:1px solid rgba(96,165,250,0.4);color:var(--blue)}
.bar--ph3{background:linear-gradient(90deg,rgba(251,191,36,0.32),rgba(251,191,36,0.16));border:1px solid rgba(251,191,36,0.38);color:var(--amber)}
.gantt__today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:0.7;z-index:10;border-radius:2px}
.gantt__today::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:var(--red);border-radius:50%}
.gantt-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.gantt-legend__item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.gantt-legend__dot{width:12px;height:10px;border-radius:3px;flex-shrink:0}

/* TIMELINE */
.timeline-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:20px 18px 24px}
.timeline{display:flex;gap:0;min-width:760px;position:relative;padding-top:16px}
.tl-step{position:relative;min-width:170px;flex:1;display:flex;flex-direction:column;align-items:flex-start}
.tl-step__connector{position:absolute;top:72px;left:calc(100% - 16px);width:calc(100% - 16px);height:2px;background:linear-gradient(90deg,var(--border-accent),var(--border));z-index:0;pointer-events:none}
.tl-step:last-child .tl-step__connector{display:none}
.tl-step__icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;border:2px solid var(--border-accent);background:var(--bg-card);position:relative;z-index:1;transition:transform .3s,border-color .3s}
.tl-step:hover .tl-step__icon{transform:translateY(-2px);border-color:var(--accent-glow)}
.tl-step--done .tl-step__icon{background:var(--green-soft);border-color:rgba(52,211,153,0.5)}
.tl-step--current .tl-step__icon{background:var(--accent-soft);border-color:rgba(124,91,245,0.5);box-shadow:0 0 0 4px rgba(124,91,245,0.15)}
.tl-step--future .tl-step__icon{opacity:0.55}
.tl-step__dot{width:10px;height:10px;border-radius:50%;background:var(--border-accent);position:absolute;top:77px;right:6px;z-index:1}
.tl-step--done .tl-step__dot{background:var(--green)}
.tl-step--current .tl-step__dot{background:var(--accent-glow);box-shadow:0 0 8px rgba(157,124,255,0.6)}
.tl-step__date{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px}
.tl-step--done .tl-step__date{color:var(--green)}
.tl-step--current .tl-step__date{color:var(--accent-glow)}
.tl-step__title{font-size:13px;font-weight:700;color:var(--text-primary);line-height:1.35;margin-bottom:4px;padding-right:16px}
.tl-step__desc{font-size:11.5px;color:var(--text-secondary);line-height:1.5;padding-right:16px}
.tl-step--future .tl-step__title,.tl-step--future .tl-step__desc,.tl-step--future .tl-step__date{color:var(--text-muted)}
.timeline-hint{margin-top:4px;padding:10px 18px;border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-muted);letter-spacing:0.5px;text-align:right}

/* ARCHITECTURE */
.arch-levels{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.arch-level{background:rgba(255,255,255,0.025);border:1px solid var(--border-accent);border-radius:10px;padding:14px}
.arch-level__head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.arch-level__num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.lv1{background:var(--accent-soft);color:var(--accent-glow)}
.lv2{background:var(--blue-soft);color:var(--blue)}
.lv3{background:var(--green-soft);color:var(--green)}
.arch-level__title{font-size:14px;font-weight:700}
.arch-level__sub{font-size:12px;color:var(--text-secondary);margin-bottom:10px;line-height:1.5}
.arch-modules{display:flex;flex-wrap:wrap;gap:6px}
.arch-module{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;padding:5px 10px;font-size:11.5px;color:var(--text-secondary)}

/* SEGMENTS */
.seg-grid{display:grid;grid-template-columns:1fr 1fr;background:var(--border);gap:1px}
@media(max-width:500px){.seg-grid{grid-template-columns:1fr}}
.seg-card{background:var(--bg-card);padding:16px;transition:background .2s}
.seg-card:hover{background:var(--bg-card-hover)}
.seg-card__icon{font-size:24px;margin-bottom:8px}
.seg-card__name{font-size:13.5px;font-weight:700;margin-bottom:4px}
.seg-card__model{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent-glow);text-transform:uppercase;margin-bottom:6px}
.seg-card__desc{font-size:12px;color:var(--text-secondary);line-height:1.5}
.seg-card:last-child:nth-child(odd){grid-column:1/-1}

/* ENTITIES */
.entities-list{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px}
.entity-tag{background:rgba(255,255,255,0.04);border:1px solid var(--border-accent);border-radius:8px;padding:7px 12px;font-size:12.5px;color:var(--text-secondary);display:flex;align-items:center;gap:7px;transition:border-color .2s,background .2s}
.entity-tag:hover{border-color:var(--accent);background:var(--accent-soft);color:var(--text-primary)}
.entity-tag span{font-size:14px}

/* RESET BTN */
.btn-reset{background:none;border:1px solid var(--border-accent);color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:all .2s;display:block;margin:20px auto 0;text-transform:uppercase}
.btn-reset:hover{border-color:var(--red);color:var(--red)}

/* CELEBRATION */
.celebration{display:none;background:var(--green-soft);border:1px solid rgba(52,211,153,0.3);border-radius:var(--radius);padding:28px;text-align:center;margin-top:28px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
.celebration.visible{display:block}
.celebration__icon{font-size:44px;margin-bottom:12px}
.celebration__title{font-size:22px;font-weight:800;color:var(--green);margin-bottom:8px}
.celebration__sub{font-size:13.5px;color:var(--text-secondary)}

/* FOOTER */
.footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* MOBILE */
@media(max-width:480px){
  .wrapper{padding:28px 14px 60px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .gantt{min-width:600px}
  .gantt__lbl{width:140px;font-size:11px}
  .gantt__head{margin-left:140px}
  .gantt__group-label{margin-left:140px}
  .lang-switch{top:10px;right:12px}
}
</style>
</head>
<body>

<canvas id="confetti-canvas" style="position:fixed;inset:0;pointer-events:none;z-index:9999"></canvas>

<div class="lang-switch">
  <button class="lang-btn active" data-lang="ru" onclick="setLang('ru')">RU</button>
  <button class="lang-btn" data-lang="sr" onclick="setLang('sr')">SR</button>
</div>

<div class="wrapper">

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
    <div class="progress-label" id="progress-label">0%</div>
  </div>

  <!-- HEADER -->
  <header class="header" style="animation:fadeDown .6s ease both">
    <div class="header__badge">🤖 <span data-i18n="badge"></span></div>
    <h1 class="header__title">AI Partner Program — <span>1XBET Serbia</span></h1>
    <p class="header__sub" data-i18n="header_sub"></p>
    <div class="header__meta">
      <div class="header__meta-item"><b>▸</b> <span data-i18n="meta_start"></span></div>
      <div class="header__meta-item"><b>▸</b> <span data-i18n="meta_finish"></span></div>
      <div class="header__meta-item"><b>▸</b> <span data-i18n="meta_team"></span></div>
      <div class="header__meta-item"><b>▸</b> <span data-i18n="meta_client"></span></div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-card__value">3</div><div class="stat-card__label" data-i18n="stat1"></div></div>
    <div class="stat-card"><div class="stat-card__value g">17</div><div class="stat-card__label" data-i18n="stat2"></div></div>
    <div class="stat-card"><div class="stat-card__value">6</div><div class="stat-card__label" data-i18n="stat3"></div></div>
    <div class="stat-card"><div class="stat-card__value a">5</div><div class="stat-card__label" data-i18n="stat4"></div></div>
    <div class="stat-card"><div class="stat-card__value g">8</div><div class="stat-card__label" data-i18n="stat5"></div></div>
    <div class="stat-card"><div class="stat-card__value">~6</div><div class="stat-card__label" data-i18n="stat6"></div></div>
  </div>

  <!-- SECTION 00: ABOUT -->
  <div class="section">
    <div class="section__header">
      <span class="section__num">00</span>
      <span class="section__title" data-i18n="s00_title"></span>
      <span class="section__badge badge--active" data-i18n="s00_badge"></span>
    </div>
    <div class="section__card">
      <div class="section__desc" data-i18n="s00_desc"></div>
      <div class="note note--info"><span class="note__icon">💡</span><span data-i18n="s00_note"></span></div>
      <div class="note note--muted" style="border-top:1px solid var(--border)"><span class="note__icon">⚡</span><span data-i18n="s00_note2"></span></div>
    </div>
  </div>

  <!-- SECTION 01: TIMELINE — KEYPOINTS -->
  <div class="section">
    <div class="section__header">
      <span class="section__num">01</span>
      <span class="section__title" data-i18n="tl_title"></span>
      <span class="section__badge badge--active" data-i18n="tl_badge"></span>
    </div>
    <div class="section__card">
      <div class="section__desc" data-i18n="tl_desc"></div>
      <div class="timeline-wrap">

      desc:'Nedeljni AI digest o partnerskom programu u Telegramu. Monitoring anomalija i ključnih metrika.' },
    { date:'Maj', icon:'🎓', status:'future',
      title:'AI kopilot za tim',
      desc:'Claude asistent sa pristupom bazi znanja odgovara na pitanja menadžera. Smanjenje opterećenja osnivača.' },
  ]
};

// ─── MONTH WIDTHS (% of 190 days) ────────────────────────────────────────────
const MONTHS_W = [7.89, 16.32, 15.79, 16.32, 16.32, 15.79, 11.58];
// Starts at: [0, 7.89, 24.21, 40.00, 56.32, 72.64, 88.43]
const MONTHS_STARTS = [0, 7.89, 24.21, 40.00, 56.32, 72.64, 88.43];

// Today = April 23, 2026 → day 8 → 4.21%
const TODAY_PCT = 4.21;

// ─── STATE ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ai_partner_program_v1';
const LANG_KEY = 'ai_pp_lang';
let lang = localStorage.getItem(LANG_KEY) || 'ru';
let wasComplete = false;

// ─── RENDER CHECKLIST ────────────────────────────────────────────────────────
function renderChecklist(containerId, tasks) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  tasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'item';
    div.dataset.key = task.id;
    if (task.done) div.classList.add('checked');
    div.innerHTML = `
      <div class="item__cb">
        <svg class="item__ck" width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1.5 5L4.5 8L10.5 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item__content">
        <div class="item__text">${task.text}</div>
        <div class="item__sub">${task.sub}</div>
        <span class="item__tag ${task.tag}">${task.tagText}</span>
      </div>`;
    div.addEventListener('click', () => toggleItem(div));
    container.appendChild(div);
  });
}

function renderAllChecklists() {
  renderChecklist('phase0-list', CHECKLIST[lang].phase0);
  renderChecklist('phase1-list', CHECKLIST[lang].phase1);
  renderChecklist('phase2-list', CHECKLIST[lang].phase2);
  renderChecklist('phase3-list', CHECKLIST[lang].phase3);
  loadState();
}

// ─── RENDER GANTT ─────────────────────────────────────────────────────────────
function renderGantt() {
  const container = document.getElementById('gantt-chart');
  if (!container) return;
  const tasks = GANTT_TASKS[lang];
  const months = T[lang].gantt_months;
  const todayLabel = T[lang].today_label;

  let html = '';

  // Month header row
  html += '<div class="gantt__head">';
  MONTHS_W.forEach((w, i) => {
    html += `<div class="gantt__month" style="width:${w}%">${months[i]}</div>`;
  });
  html += '</div>';

  // For each group
  tasks.forEach(group => {
    html += `<div class="gantt__group-label">${group.group}</div>`;
    group.tasks.forEach(task => {
      html += `<div class="gantt__row">
        <div class="gantt__lbl">${task.lbl}</div>
        <div class="gantt__track">
          <div class="gantt__track-bg">`;
      // Vertical month lines
      MONTHS_STARTS.slice(1).forEach(x => {
        html += `<div class="gantt__vl" style="left:${x}%"></div>`;
      });
      // Today marker
      html += `<div class="gantt__today" style="left:${TODAY_PCT}%" title="${todayLabel}"></div>`;
      html += `</div>
          <div class="gantt__bar ${group.cls}" style="left:${task.l}%;width:${task.w}%"></div>
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

// ─── RENDER ARCHITECTURE ──────────────────────────────────────────────────────
function renderArch() {
  const container = document.getElementById('arch-content');
  if (!container) return;
  container.innerHTML = ARCH[lang].map(l => `
    <div class="arch-level">
      <div class="arch-level__head">
        <div class="arch-level__num ${l.cls}">${l.num}</div>
        <div class="arch-level__title">${l.title}</div>
      </div>
      <div class="arch-level__sub">${l.sub}</div>
      <div class="arch-modules">${l.modules.map(m=>`<div class="arch-module">${m}</div>`).join('')}</div>
    </div>`).join('');
}

// ─── RENDER SEGMENTS ─────────────────────────────────────────────────────────
function renderSegments() {
  const container = document.getElementById('segments-content');
  if (!container) return;
  container.innerHTML = SEGMENTS[lang].map(s => `
    <div class="seg-card">
      <div class="seg-card__icon">${s.icon}</div>
      <div class="seg-card__name">${s.name}</div>
      <div class="seg-card__model">${s.model}</div>
      <div class="seg-card__desc">${s.desc}</div>
    </div>`).join('');
}

// ─── RENDER ENTITIES ─────────────────────────────────────────────────────────
function renderEntities() {
  const container = document.getElementById('entities-content');
  if (!container) return;
  container.innerHTML = ENTITIES[lang].map(([icon, name]) =>
    `<div class="entity-tag"><span>${icon}</span>${name}</div>`).join('');
}

// ─── RENDER TIMELINE ──────────────────────────────────────────────────────────
function renderTimeline() {
  const container = document.getElementById('timeline-content');
  if (!container) return;
  container.innerHTML = TIMELINE[lang].map(step => `
    <div class="tl-step tl-step--${step.status}">
      <div class="tl-step__connector"></div>
      <div class="tl-step__icon">${step.icon}</div>
      <div class="tl-step__dot"></div>
      <div class="tl-step__date">${step.date}</div>
      <div class="tl-step__title">${step.title}</div>
      <div class="tl-step__desc">${step.desc}</div>
    </div>
  `).join('');
}

// ─── I18N ─────────────────────────────────────────────────────────────────────
function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (T[lang][key] !== undefined) el.textContent = T[lang][key];
  });
  document.documentElement.lang = lang === 'ru' ? 'ru' : 'sr';
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

function setLang(l) {
  lang = l;
  localStorage.setItem(LANG_KEY, l);
  applyTranslations();
  renderAllChecklists();
  renderGantt();
  renderTimeline();
  renderArch();
  renderSegments();
  renderEntities();
}

// ─── CHECKLIST LOGIC ──────────────────────────────────────────────────────────
function getState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
}

function saveState() {
  const state = {};
  document.querySelectorAll('.item[data-key]').forEach(el => {
    state[el.dataset.key] = el.classList.contains('checked');
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function loadState() {
  const state = getState();
  document.querySelectorAll('.item[data-key]').forEach(el => {
    const key = el.dataset.key;
    const isDone = el.classList.contains('checked');
    const fromStorage = state[key];
    if (isDone || fromStorage) el.classList.add('checked');
    else el.classList.remove('checked');
  });
  updateProgress(false);
}

function toggleItem(el) {
  el.classList.toggle('checked');
  saveState();
  updateProgress(true);
}

function updateProgress(canCelebrate) {
  const all = document.querySelectorAll('.item[data-key]');
  const done = document.querySelectorAll('.item[data-key].checked');
  const pct = all.length > 0 ? Math.round((done.length / all.length) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';

  const celebration = document.getElementById('celebration');
  if (pct === 100 && canCelebrate && !wasComplete) {
    wasComplete = true;
    celebration.classList.add('visible');
    launchConfetti();
  } else if (pct < 100) {
    wasComplete = false;
    celebration.classList.remove('visible');
  }
}

function resetProgress() {
  const msgs = { ru:'Сбросить весь прогресс?', sr:'Resetovati sav napredak?' };
  if (!confirm(msgs[lang])) return;
  document.querySelectorAll('.item[data-key]').forEach(el => el.classList.remove('checked'));
  localStorage.setItem(STORAGE_KEY, '{}');
  wasComplete = false;
  document.getElementById('celebration').classList.remove('visible');
  updateProgress(false);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#7c5bf5','#9d7cff','#34d399','#6ee7b7','#fbbf24','#60a5fa','#f87171','#a78bfa','#4ade80','#facc15'];
  let particles = [];

  const burst = (x, y) => {
    for (let i = 0; i < 100; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 8 + 2;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 4,
        r: Math.random() * 5 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        gravity: 0.2, friction: 0.98, opacity: 1,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
      });
    }
  };

  const locs = [[0.2,0.3],[0.5,0.2],[0.8,0.3],[0.1,0.6],[0.5,0.5],[0.9,0.6],[0.3,0.8],[0.7,0.8],[0.5,0.9]];
  locs.forEach(([xr, yr], i) => {
    setTimeout(() => burst(canvas.width * xr, canvas.height * yr), i * 150);
  });

  let start = null;
  const animate = (ts) => {
    if (!start) start = ts;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.opacity > 0.05);
    particles.forEach(p => {
      p.vy += p.gravity; p.vx *= p.friction; p.vy *= p.friction;
      p.x += p.vx; p.y += p.vy; p.opacity -= 0.008; p.rotation += p.rotSpeed;
      ctx.save(); ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
      ctx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
      ctx.restore();
    });
    if (ts - start < 8000 && particles.length > 0) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  };
  requestAnimationFrame(animate);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
applyTranslations();
renderAllChecklists();
renderGantt();
renderTimeline();
renderArch();
renderSegments();
renderEntities();
</script>
</body>
